<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="frameG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="letterG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="40%" stop-color="#48D1CC"/>
      <stop offset="100%" stop-color="#80FFEA"/>
    </linearGradient>
    <linearGradient id="barG" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#36B37E"/>
    </linearGradient>
    <linearGradient id="flameG" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFEC80"/>
    </linearGradient>
    <linearGradient id="arcG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#36B37E"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowFlame">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded rectangle frame -->
  <rect x="6" y="6" width="116" height="116" rx="18" ry="18"
    fill="none" stroke="url(#frameG)" stroke-width="1.8" opacity="0.7"/>
  <rect x="9" y="9" width="110" height="110" rx="15" ry="15"
    fill="#0B1628" opacity="0.85"/>

  <!-- Subtle inner frame glow -->
  <rect x="9" y="9" width="110" height="110" rx="15" ry="15"
    fill="none" stroke="#00E5FF" stroke-width="0.3" opacity="0.15"/>

  <!-- Network nodes (upper-left) -->
  <g fill="#00E5FF" opacity="0.7" filter="url(#glow)">
    <circle cx="24" cy="24" r="2"/>
    <circle cx="36" cy="18" r="1.6"/>
    <circle cx="42" cy="30" r="1.8"/>
    <circle cx="28" cy="38" r="1.5"/>
    <circle cx="18" cy="34" r="1.3"/>
    <circle cx="48" cy="20" r="1.4"/>
  </g>
  <g stroke="#00E5FF" stroke-width="0.5" opacity="0.35">
    <line x1="24" y1="24" x2="36" y2="18"/>
    <line x1="36" y1="18" x2="48" y2="20"/>
    <line x1="36" y1="18" x2="42" y2="30"/>
    <line x1="24" y1="24" x2="42" y2="30"/>
    <line x1="24" y1="24" x2="28" y2="38"/>
    <line x1="24" y1="24" x2="18" y2="34"/>
    <line x1="28" y1="38" x2="42" y2="30"/>
  </g>

  <!-- Radar arcs (left side) -->
  <path d="M32 72 A26 26 0 0 1 32 46" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.3"/>
  <path d="M27 68 A20 20 0 0 1 27 50" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.25"/>
  <!-- Green arc highlight segment -->
  <path d="M34 70 A24 24 0 0 1 30 58" fill="none" stroke="url(#arcG)" stroke-width="2.5"
    stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
  <!-- Small green dots on arc -->
  <circle cx="30" cy="58" r="1.8" fill="#36B37E" opacity="0.9" filter="url(#glow)"/>
  <circle cx="34" cy="70" r="1.8" fill="#36B37E" opacity="0.9" filter="url(#glow)"/>

  <!-- Shield mini icon (on the arc) -->
  <path d="M30 62 L33.5 60 L33.5 63 C33.5 65 32 66.5 30 67.5 C28 66.5 26.5 65 26.5 63 L26.5 60 Z"
    fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.6"/>

  <!-- === PA Letters (crystalline/faceted, center) === -->
  <!-- P letter -->
  <g filter="url(#glowStrong)" opacity="0.9">
    <!-- P vertical bar -->
    <polygon points="40,42 44,42 44,82 40,82" fill="url(#letterG)" opacity="0.7"/>
    <!-- P bump/curve top -->
    <polygon points="44,42 62,42 64,44 64,56 62,58 44,58" fill="url(#letterG)" opacity="0.55"/>
    <!-- P inner cutout (darker) -->
    <polygon points="47,46 59,46 60,47 60,53 59,54 47,54" fill="#0B1628" opacity="0.7"/>
    <!-- Facet highlight lines -->
    <line x1="44" y1="42" x2="56" y2="48" stroke="#FFFFFF" stroke-width="0.3" opacity="0.3"/>
    <line x1="62" y1="42" x2="52" y2="52" stroke="#80FFEA" stroke-width="0.3" opacity="0.25"/>
  </g>

  <!-- A letter -->
  <g filter="url(#glowStrong)" opacity="0.9">
    <!-- A left leg -->
    <polygon points="64,82 70,42 74,42 68,82" fill="url(#letterG)" opacity="0.7"/>
    <!-- A right leg -->
    <polygon points="78,42 82,42 88,82 84,82" fill="url(#letterG)" opacity="0.6"/>
    <!-- A crossbar -->
    <polygon points="67,66 85,66 84,62 68,62" fill="url(#letterG)" opacity="0.55"/>
    <!-- A top peak -->
    <polygon points="70,42 78,42 74,34" fill="url(#letterG)" opacity="0.65"/>
    <!-- Facet highlights -->
    <line x1="74" y1="34" x2="70" y2="52" stroke="#FFFFFF" stroke-width="0.3" opacity="0.3"/>
    <line x1="74" y1="34" x2="82" y2="52" stroke="#80FFEA" stroke-width="0.3" opacity="0.2"/>
  </g>

  <!-- Sparkle on P -->
  <g opacity="0.6">
    <line x1="50" y1="39" x2="50" y2="35" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="48" y1="37" x2="52" y2="37" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>
  <!-- Sparkle on A -->
  <g opacity="0.5">
    <line x1="80" y1="38" x2="80" y2="34" stroke="#FFFFFF" stroke-width="0.5"/>
    <line x1="78" y1="36" x2="82" y2="36" stroke="#FFFFFF" stroke-width="0.5"/>
  </g>

  <!-- Dynatrace Flame (upper-right) -->
  <g transform="translate(96,20)" filter="url(#glowFlame)">
    <!-- Flame body -->
    <path d="M0,12 C0,4 4,-2 6,-4 C6,0 10,2 10,6 C12,4 12,0 11,-2 C15,2 16,8 14,14 C12,18 8,20 4,20 C0,20 -2,16 0,12 Z"
      fill="url(#flameG)" opacity="0.9"/>
    <!-- Inner flame -->
    <path d="M4,16 C4,12 6,10 7,8 C8,10 9,12 9,14 C10,12 10,10 9,8 C11,10 12,13 10,16 C9,18 6,18 4,16 Z"
      fill="#4488FF" opacity="0.7"/>
    <!-- Glow rays -->
    <g stroke="#FFD700" stroke-width="0.5" opacity="0.4">
      <line x1="7" y1="-6" x2="7" y2="-9"/>
      <line x1="14" y1="-3" x2="17" y2="-5"/>
      <line x1="0" y1="-3" x2="-3" y2="-5"/>
      <line x1="16" y1="4" x2="19" y2="3"/>
      <line x1="-2" y1="4" x2="-5" y2="3"/>
    </g>
  </g>

  <!-- Gear (right side) -->
  <g transform="translate(100,56)" stroke="#00B4D8" fill="none" stroke-width="0.8" opacity="0.6">
    <circle cx="0" cy="0" r="5"/>
    <circle cx="0" cy="0" r="2" fill="#00B4D8" opacity="0.3"/>
    <!-- Gear teeth -->
    <line x1="0" y1="-5" x2="0" y2="-7.5"/>
    <line x1="4.3" y1="-2.5" x2="6.5" y2="-3.8"/>
    <line x1="4.3" y1="2.5" x2="6.5" y2="3.8"/>
    <line x1="0" y1="5" x2="0" y2="7.5"/>
    <line x1="-4.3" y1="2.5" x2="-6.5" y2="3.8"/>
    <line x1="-4.3" y1="-2.5" x2="-6.5" y2="-3.8"/>
  </g>

  <!-- Bar chart (bottom-right, ascending) -->
  <g opacity="0.8">
    <rect x="82" y="88" width="5" height="14" rx="1" fill="url(#barG)" opacity="0.5"/>
    <rect x="89" y="82" width="5" height="20" rx="1" fill="url(#barG)" opacity="0.6"/>
    <rect x="96" y="76" width="5" height="26" rx="1" fill="url(#barG)" opacity="0.7"/>
    <rect x="103" y="70" width="5" height="32" rx="1" fill="url(#barG)" opacity="0.8"/>
  </g>
  <!-- Arrow on chart -->
  <polyline points="84,94 106,72" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.4"
    stroke-linecap="round"/>
  <polygon points="106,72 102,74 104,78" fill="#FFFFFF" opacity="0.35"/>

  <!-- Circuit traces (bottom) -->
  <g stroke="#00E5FF" stroke-width="0.6" opacity="0.2" stroke-linecap="round">
    <polyline points="16,100 30,100 34,96 50,96"/>
    <polyline points="50,96 54,100 70,100 74,96 82,96"/>
    <polyline points="16,106 28,106 32,102 46,102 50,106 62,106"/>
    <polyline points="62,106 66,102 78,102"/>
    <!-- Small squares as circuit nodes -->
    <rect x="49" y="95" width="2" height="2" fill="#00E5FF" opacity="0.3"/>
    <rect x="73" y="95" width="2" height="2" fill="#00E5FF" opacity="0.3"/>
    <rect x="33" y="101" width="2" height="2" fill="#00E5FF" opacity="0.3"/>
    <rect x="65" y="101" width="2" height="2" fill="#00E5FF" opacity="0.3"/>
  </g>

  <!-- Scattered glow particles -->
  <g fill="#00E5FF" opacity="0.4">
    <circle cx="14" cy="50" r="0.8"/>
    <circle cx="18" cy="80" r="0.6"/>
    <circle cx="112" cy="40" r="0.7"/>
    <circle cx="110" cy="90" r="0.6"/>
    <circle cx="58" cy="112" r="0.7"/>
    <circle cx="90" cy="112" r="0.6"/>
    <circle cx="14" cy="18" r="0.7"/>
    <circle cx="56" cy="14" r="0.6"/>
  </g>
</svg>
